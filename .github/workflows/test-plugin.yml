name: Test Etherpad Plugin
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  PLUGIN_NAME: ep_markdown
jobs:
  test:
    name: "Node ${{ matrix.node }} – Etherpad ${{ matrix.etherpad-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
        etherpad-version: ["latest"]   # pin a specific tag, e.g. "2.2.6"
    steps:
      # ── 1. Checkout the plugin ──────────────────────────────
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin
      # ── 2. Set up Node.js ───────────────────────────────────
      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: "**/package.json"
      # ── 3. Resolve the latest Etherpad release tag ──────────
      - name: Resolve Etherpad version tag
        id: etherpad-tag
        run: |
          if [ "${{ matrix.etherpad-version }}" = "latest" ]; then
            TAG=$(curl -s https://api.github.com/repos/ether/etherpad-lite/releases/latest \
                  | jq -r '.tag_name')
          else
            TAG="${{ matrix.etherpad-version }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved Etherpad version: $TAG"
      # ── 4. Checkout Etherpad ────────────────────────────────
      - name: Checkout Etherpad ${{ steps.etherpad-tag.outputs.tag }}
        uses: actions/checkout@v4
        with:
          repository: ether/etherpad
          ref: ${{ steps.etherpad-tag.outputs.tag }}
          path: etherpad
      # ── 5. Install Etherpad dependencies ────────────────────
      - name: Install Etherpad dependencies
        working-directory: etherpad
        run: npm ci
      # ── 6. Install plugin from local checkout ───────────────
      - name: Install plugin into Etherpad
        working-directory: etherpad
        run: npm install "../plugin"
      # ── 7. Verify plugin is registered ──────────────────────
      - name: Verify plugin registration
        working-directory: etherpad
        env:
          PLUGIN_NAME: ${{ env.PLUGIN_NAME }}
        run: |
          node -e "
            const plugins = require('./src/node/utils/Plugins');
            const list = Object.keys(plugins.getPackageDetails());
            console.log('Installed plugins:', list);
            const name = process.env.PLUGIN_NAME;
            if (list.indexOf(name) === -1) {
              console.error('Plugin ' + name + ' NOT found in Etherpad plugin list');
              process.exit(1);
            }
            console.log('Plugin found OK');
          "
      # ── 8. Run plugin's own test suite (if present) ─────────
      - name: Run plugin unit tests
        working-directory: plugin
        run: |
          if npm run 2>/dev/null | grep -q "^  test$"; then
            npm test
          else
            echo "No 'test' script found in plugin – skipping."
          fi
      # ── 9. Configure Etherpad for CI (DirtyDB, no external DB)
      - name: Create Etherpad CI settings
        run: |
          cp etherpad/settings.json.template etherpad/settings.json
          node -e "
            const fs = require('fs');
            const s = JSON.parse(fs.readFileSync('etherpad/settings.json', 'utf8'));
            s.dbType = 'dirty';
            s.dbSettings = { filename: '/tmp/etherpad-test.db' };
            s.port = 9001;
            s.trustProxy = true;
            fs.writeFileSync('etherpad/settings.json', JSON.stringify(s, null, 2));
          "
      # ── 10. Start Etherpad and wait until it's ready ────────
      - name: Start Etherpad (background)
        working-directory: etherpad
        run: |
          node src/node/server.js &
          echo "ETHERPAD_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9001/api > /dev/null 2>&1; then
              echo "Etherpad is ready after ${i}s"
              break
            fi
            sleep 1
          done
      # ── 11. Run Etherpad backend tests (includes plugin tests)
      - name: Run Etherpad backend tests
        working-directory: etherpad
        run: npm run test-backend
      # ── 12. Tear down ────────────────────────────────────────
      - name: Stop Etherpad
        if: always()
        run: kill "$ETHERPAD_PID" || true
      # ── 13. Upload test artefacts ────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node${{ matrix.node }}-ep${{ steps.etherpad-tag.outputs.tag }}
          path: |
            etherpad/test-results/
            plugin/test-results/
          if-no-files-found: ignore
