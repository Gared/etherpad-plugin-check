name: Test Etherpad Plugin
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: write

jobs:
  PluginMatrix:
    name: Load list of plugins
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.load-plugins.outputs.matrix }}
    steps:
      - id: load-plugins
        run: |
          set -euo pipefail
          PLUGINS="$(curl -fsSL https://static.etherpad.org/plugins.json \
            | python3 -c "import json,sys; plugins = json.load(sys.stdin); \
            matrix = sorted(plugins.keys()); \
            print(json.dumps(matrix))")"
          echo "matrix=$PLUGINS" >> "$GITHUB_OUTPUT"

  test:
    name: "ep ${{ matrix.etherpad-version }} - Plugin ${{ matrix.plugin }}"
    needs: PluginMatrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [ "22" ]
        plugin: ${{ fromJSON(needs.PluginMatrix.outputs.matrix) }}
        etherpad-version: [ "2.7.2" ]
    steps:
      - name: Clone etherpad repository
        uses: actions/checkout@v6
        with:
          repository: ether/etherpad
          path: etherpad
          ref: ${{ matrix.etherpad-version }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        working-directory: etherpad
        run: bin/installDeps.sh

      - name: Install plugin
        working-directory: etherpad
        run: pnpm run plugins i "${{ matrix.plugin }}"

      - name: Start Etherpad (background)
        working-directory: etherpad
        run: |
          bin/run.sh &
          echo "ETHERPAD_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9001/api > /dev/null 2>&1; then
              echo "Etherpad is ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run the backend tests
        id: backend_tests
        working-directory: etherpad
        run: pnpm test

      - name: Run the new vitest tests
        id: vitest_tests
        working-directory: etherpad/src
        run: pnpm run test:vitest

      - name: Write test status JSON
        if: always()
        run: |
          mkdir -p status
          STATUS="failed"
          SUCCESS=false
          if [ "${{ steps.backend_tests.outcome }}" = "success" ] && [ "${{ steps.vitest_tests.outcome }}" = "success" ]; then
            STATUS="success"
            SUCCESS=true
          fi
          cat > "status/test-status-${{ matrix.plugin }}.json" <<JSON
          {
            "success": ${SUCCESS},
            "status": "${STATUS}",
            "plugin": "${{ matrix.plugin }}",
            "node": "${{ matrix.node }}",
            "etherpadVersion": "${{ matrix.etherpad-version }}",
            "backendTests": "${{ steps.backend_tests.outcome }}",
            "vitest": "${{ steps.vitest_tests.outcome }}",
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "runId": "${{ github.run_id }}",
            "runAttempt": "${{ github.run_attempt }}",
            "workflow": "${{ github.workflow }}",
            "createdAt": "${{ github.run_started_at }}"
          }
          JSON

      - name: Upload status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "status-${{ matrix.etherpad-version }}-${{ matrix.plugin }}"
          path: "status/test-status-${{ matrix.plugin }}.json"
          if-no-files-found: error

  publish-status:
    name: Publish status JSON files
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Download all status artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: status-${{ matrix.etherpad-version }}-*
          merge-multiple: true

      - name: Merge status files into one JSON
        run: |
          set -euo pipefail
          mkdir -p ci
          shopt -s nullglob
          files=(artifacts/test-status-*.json)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "[]" > ci/test-status-${{ matrix.etherpad-version }}.json
            echo "No status files found; wrote empty array."
          else
            python3 - <<'PY'
          import json
          import glob

          files = sorted(glob.glob("artifacts/test-status-*.json"))
          merged = []
          for path in files:
              with open(path, "r", encoding="utf-8") as f:
                  merged.append(json.load(f))

          with open("ci/test-status-${{ matrix.etherpad-version }}.json", "w", encoding="utf-8") as out:
              json.dump(merged, out, indent=2)
              out.write("\n")
          PY
            echo "Merged ${#files[@]} files into ci/test-status-${{ matrix.etherpad-version }}.json"
          fi

      - name: Commit and push once
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/test-status-${{ matrix.etherpad-version }}.json
          if git diff --cached --quiet; then
            echo "No status change to commit"
            exit 0
          fi
          git commit -m "ci: update test status json [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
