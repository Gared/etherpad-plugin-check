name: Test Etherpad Plugin
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: write

jobs:
  PluginMatrix:
    name: Load list of plugins
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.load-plugins.outputs.matrix }}
    steps:
      - id: load-plugins
        run: |
          set -euo pipefail
          PLUGINS="$(curl -fsSL https://static.etherpad.org/plugins.json \
            | python3 -c "import json,sys; plugins = json.load(sys.stdin); \
            matrix = [p for p in plugins.keys()]; \
            print(json.dumps(matrix))")"
          echo "matrix=$PLUGINS" >> "$GITHUB_OUTPUT"

  test:
    name: "ep ${{ matrix.etherpad-version }} - Plugin ${{ matrix.plugin }}"
    needs: PluginMatrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [ "22" ]
        plugin: ${{ fromJSON(needs.PluginMatrix.outputs.matrix) }}
        etherpad-version: [ "2.7.2" ]   # pin a specific tag, e.g. "2.2.6"
    steps:
      - name: Clone etherpad repository
        uses: actions/checkout@v6
        with:
          repository: ether/etherpad
          path: etherpad
          ref: ${{ matrix.etherpad-version }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        working-directory: etherpad
        run: bin/installDeps.sh

      - name: Install plugin
        working-directory: etherpad
        run: pnpm run plugins i "${{ matrix.plugin }}"

      - name: Start Etherpad (background)
        working-directory: etherpad
        run: |
          bin/run.sh &
          echo "ETHERPAD_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9001/api > /dev/null 2>&1; then
              echo "Etherpad is ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run the backend tests
        id: backend_tests
        working-directory: etherpad
        run: pnpm test

      - name: Run the new vitest tests
        id: vitest_tests
        working-directory: etherpad/src
        run: pnpm run test:vitest

      - name: Write test status JSON
        working-directory: repo
        env:
          BACKEND_RESULT: ${{ steps.backend_tests.outcome }}
          VITEST_RESULT: ${{ steps.vitest_tests.outcome }}
          PLUGIN_NAME: ${{ matrix.plugin }}
          ETHERPAD_VERSION: ${{ matrix.etherpad-version }}
          NODE_VERSION: ${{ matrix.node }}
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW: ${{ github.workflow }}
          CREATED_AT: ${{ github.run_started_at }}
        run: |
          mkdir -p ci
          STATUS="failed"
          SUCCESS=false
          if [ "$BACKEND_RESULT" = "success" ] && [ "$VITEST_RESULT" = "success" ]; then
            STATUS="success"
            SUCCESS=true
          fi
          cat > ci/test-status-${{ matrix.plugin }}.json <<JSON
          {
            "success": ${SUCCESS},
            "status": "${STATUS}",
            "plugin": "${PLUGIN_NAME}",
            "node": "${NODE_VERSION}",
            "etherpadVersion": "${ETHERPAD_VERSION}",
            "backendTests": "${BACKEND_RESULT}",
            "vitest": "${VITEST_RESULT}",
            "sha": "${GIT_SHA}",
            "ref": "${GIT_REF}",
            "runId": "${RUN_ID}",
            "runAttempt": "${RUN_ATTEMPT}",
            "workflow": "${WORKFLOW}",
            "createdAt": "${CREATED_AT}"
          }
          JSON

      - name: Upload status artifact
        uses: actions/upload-artifact@v4
        with:
          name: "status-${{ matrix.plugin }}"
          path: "status/test-status-${{ matrix.plugin }}.json"
          if-no-files-found: error

