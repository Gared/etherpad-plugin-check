name: Test Etherpad Plugin
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: write

env:
  PLUGIN_NAME: ep_markdown
jobs:
  test:
    name: "Node ${{ matrix.node }} – Etherpad ${{ matrix.etherpad-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [ "22" ]
        etherpad-version: [ "2.7.2" ]   # pin a specific tag, e.g. "2.2.6"
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v6
        with:
          path: repo

      - name: Clone etherpad repository
        uses: actions/checkout@v6
        with:
          repository: ether/etherpad
          path: etherpad
          ref: ${{ matrix.etherpad-version }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Start Etherpad (background)
        working-directory: etherpad
        run: |
          bin/run.sh &
          echo "ETHERPAD_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9001/api > /dev/null 2>&1; then
              echo "Etherpad is ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Install plugin
        working-directory: etherpad
        run: pnpm run plugins i "${{ env.PLUGIN_NAME }}"

      - name: Run the backend tests
        id: backend_tests
        working-directory: etherpad
        run: pnpm test

      - name: Run the new vitest tests
        id: vitest_tests
        working-directory: etherpad/src
        run: pnpm run test:vitest

      - name: Write test status JSON
        if: always()
        working-directory: repo
        env:
          BACKEND_RESULT: ${{ steps.backend_tests.outcome }}
          VITEST_RESULT: ${{ steps.vitest_tests.outcome }}
          PLUGIN_NAME: ${{ env.PLUGIN_NAME }}
          ETHERPAD_VERSION: ${{ matrix.etherpad-version }}
          NODE_VERSION: ${{ matrix.node }}
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW: ${{ github.workflow }}
          CREATED_AT: ${{ github.run_started_at }}
        run: |
          mkdir -p ci
          STATUS="failed"
          SUCCESS=false
          if [ "$BACKEND_RESULT" = "success" ] && [ "$VITEST_RESULT" = "success" ]; then
            STATUS="success"
            SUCCESS=true
          fi
          cat > ci/test-status.json <<JSON
          {
            "success": ${SUCCESS},
            "status": "${STATUS}",
            "plugin": "${PLUGIN_NAME}",
            "node": "${NODE_VERSION}",
            "etherpadVersion": "${ETHERPAD_VERSION}",
            "backendTests": "${BACKEND_RESULT}",
            "vitest": "${VITEST_RESULT}",
            "sha": "${GIT_SHA}",
            "ref": "${GIT_REF}",
            "runId": "${RUN_ID}",
            "runAttempt": "${RUN_ATTEMPT}",
            "workflow": "${WORKFLOW}",
            "createdAt": "${CREATED_AT}"
          }
          JSON

      - name: Commit test status JSON
        if: always() && github.event_name == 'push'
        working-directory: repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/test-status.json
          if git diff --cached --quiet; then
            echo "No status change to commit"
            exit 0
          fi
          git commit -m "ci: update test status json [skip ci]"
          git push
